<style>

  .lf-logo-section {
    background-color: #ffffff;
    padding: 60px 15px;
    max-width: 1200px;
    margin: 0 auto 50px auto;
    overflow: hidden;
    border-top: 1px solid #eaeaea;
    border-bottom: 1px solid #eaeaea;
    font-family: Arial, sans-serif;
  }
  
  .lf-logo-title {
    text-align: center;
    font-size: 22px;
    color: #2c3e50;
    font-weight: bold;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }


  .lf-logo-marquee {
    display: flex;
    overflow: hidden;
    width: 100%;
    position: relative;
  
    -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  }

  .lf-logo-track {
    display: flex;
    align-items: center;
    gap: 70px; 
    width: max-content;
    animation: lf-logo-scroll 20s linear infinite;
  }


  .lf-logo-track:hover {
    animation-play-state: paused;
  }

  @keyframes lf-logo-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); } 
  }


  .lf-logo-img {
    height: 55px;
    width: auto;
    max-width: 180px; 
    object-fit: contain;

    filter: grayscale(100%) opacity(60%);
    transition: all 0.4s ease;
  }


  .lf-logo-img:hover {
    filter: grayscale(0%) opacity(100%);
    transform: scale(1.05); 
  }
</style>


<div class="lf-logo-section">
