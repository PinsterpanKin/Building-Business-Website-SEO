<style>
 
  .lf-pt-gallery-section {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: 60px auto;
    overflow: hidden;
    padding: 0 15px;
  }
  
  .lf-pt-gallery-title {
    font-size: 24px;
    color: #2c3e50;
    font-weight: bold;
    text-align: center;
    margin-bottom: 30px;
    position: relative;
    text-transform: capitalize;
  }

  .lf-pt-marquee-wrapper {
    display: flex;
    overflow: hidden;
    width: 100%;
    position: relative;
    -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  }

  .lf-pt-marquee-track {
    display: flex;
    gap: 20px;
    width: max-content;
    animation: lf-pt-scroll 30s linear infinite;
  }

  .lf-pt-marquee-track:hover {
    animation-play-state: paused;
  }

  @keyframes lf-pt-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); } 
  }

  .lf-pt-gallery-img {
    width: 350px;
    height: 250px;
    object-fit: cover; 
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border: 2px solid #ffffff;
    transition: transform 0.3s ease;
  }

  .lf-pt-gallery-img:hover {
    transform: scale(1.03);
  }
</style>
