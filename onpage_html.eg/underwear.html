<style>
  /* --- 1. Underwear 页面整体背景与排版 --- */
  .lf-uw-section {
    background-color: #ffffff; /* 纯白底色，最能凸显内衣干净、舒适的质感 */
    padding: 80px 20px 100px 20px;
    font-family: Arial, sans-serif;
  }

  .lf-uw-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .lf-uw-header {
    text-align: center;
    margin-bottom: 60px;
  }

  .lf-uw-title {
    font-size: 38px;
    font-weight: 900;
    color: #111827;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .lf-uw-subtitle {
    font-size: 16px;
    color: #666666;
    max-width: 700px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* --- 2. 专为 5 张图定制的 6列网格布局 --- */
  .lf-uw-grid {
    display: grid !important;
    grid-template-columns: repeat(6, 1fr) !important; /* 总共分为6份 */
    gap: 30px; 
  }

  /* 第一、第二张图各占 3份（即各占 50%），形成第一排 2张大图 */
  .lf-uw-card:nth-child(1),
  .lf-uw-card:nth-child(2) {
    grid-column: span 3 !important;
  }

  /* 第三、四、五张图各占 2份（即各占 33.3%），形成第二排 3张图 */
  .lf-uw-card:nth-child(n+3) {
    grid-column: span 2 !important;
  }

  /* 图片卡片基础特效 */
  .lf-uw-card {
    border-radius: 6px;
    overflow: hidden;
    background: #f9f9f9;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  .lf-uw-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
  }

  /* 图片尺寸固定，去除了底部的文本区 */
  .lf-uw-card img {
    width: 100%;
    height: 450px; /* 统一高度，完美展现细节 */
    object-fit: cover; 
    display: block;
    cursor: pointer; 
    transition: opacity 0.3s;
  }

  .lf-uw-card img:hover {
    opacity: 0.85; /* 交互暗示可点击 */
  }

  /* --- 3. 响应式调整 --- */
  /* 平板端 (小于 900px) 变为全部两列布局 */
  @media (max-width: 900px) {
    .lf-uw-card:nth-child(n) {
      grid-column: span 3 !important; 
    }
  }
  
  /* 手机端 (小于 600px) 变为单列大图布局 */
  @media (max-width: 600px) {
    .lf-uw-card:nth-child(n) {
      grid-column: span 6 !important; 
    }
    .lf-uw-card img {
      height: 350px; /* 手机端稍微降低图片高度 */
    }
  }

  /* --- 4. 点击放大的灯箱 (Lightbox) 样式 --- */
  .lf-uw-lightbox {
    display: none; 
    position: fixed;
    z-index: 99999; 
    padding-top: 5vh;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0, 0, 0, 0.9); 
    backdrop-filter: blur(5px); 
  }

  .lf-uw-lightbox-content {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 85vh;
    border-radius: 4px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    object-fit: contain;
    animation: lf-uw-zoom 0.3s ease; 
  }

  .lf-uw-lightbox-close {
    position: absolute;
    top: 30px;
    right: 40px;
    color: #ffffff;
    font-size: 45px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  .lf-uw-lightbox-close:hover {
    color: #5ab15a; 
  }

  @keyframes lf-uw-zoom {
    from {transform: scale(0.9); opacity: 0;} 
    to {transform: scale(1); opacity: 1;}
  }
</style>

<!-- 展示容器 -->
<div class="lf-uw-section">
  <div class="lf-uw-container">
    
    <!-- 页头介绍 -->
    <div class="lf-uw-header">
      <h1 class="lf-uw-title">Basic Underwear</h1>
      <p class="lf-uw-subtitle">Crafted for ultimate comfort. Focusing on softness and breathability, we produce high-quality basic undergarments engineered for everyday wear and lasting shape retention.</p>
    </div>
    
    <!-- 2+3 网格图片区 -->
    <div class="lf-uw-grid">
      <!-- Image 1 -->
      <div class="lf-uw-card">
        <img src="http://lgfapparel.com/wp-content/uploads/2026/05/p7.1.png">
      </div>
      <!-- Image 2 -->
      <div class="lf-uw-card">
        <img src="http://lgfapparel.com/wp-content/uploads/2026/05/p7.2.png">
      </div>
      <!-- Image 3 -->
      <div class="lf-uw-card">
        <img src="http://lgfapparel.com/wp-content/uploads/2026/05/p7.3.png">
      </div>
      <!-- Image 4 -->
      <div class="lf-uw-card">
        <img src="http://lgfapparel.com/wp-content/uploads/2026/05/p7.4.png">
      </div>
      <!-- Image 5 -->
      <div class="lf-uw-card">
        <img src="http://lgfapparel.com/wp-content/uploads/2026/05/p7.5.png">
      </div>
    </div>

  </div>
</div>

<!-- 隐藏的灯箱结构 -->
<div id="lf-uw-lightbox" class="lf-uw-lightbox">
  <span class="lf-uw-lightbox-close">&times;</span>
  <img class="lf-uw-lightbox-content" id="lf-uw-lightbox-img">
</div>

<!-- 灯箱交互脚本 -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var modal = document.getElementById("lf-uw-lightbox");
    var modalImg = document.getElementById("lf-uw-lightbox-img");
    var images = document.querySelectorAll(".lf-uw-card img");

    // 遍历所有图片，点击时加载大图
    images.forEach(function(img) {
      img.onclick = function() {
        modal.style.display = "block";
        modalImg.src = this.src;
      }
    });

    // 点击 X 关闭
    var span = document.getElementsByClassName("lf-uw-lightbox-close");
    span.onclick = function() { 
      modal.style.display = "none";
    }

    // 点击背景黑底也能关闭
    modal.onclick = function(e) {
      if(e.target !== modalImg) {
        modal.style.display = "none";
      }
    }
  });
</script>
