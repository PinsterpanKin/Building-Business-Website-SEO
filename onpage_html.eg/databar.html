
<!--
  Data Bar component: presents four key metrics as animated counters.
  - Purpose: visually highlight factory/brand statistics (years, fabrics, fill power, AQL stage).
  - Behavior: CSS styles the grid and numbers; JS animates count-up when the section scrolls into view.
  - Usage: drop this component into any page section to display quick stats; it's purely presentational.
-->

<style>
  .lf-stats-section {
    background-color: #111827; 
    padding: 70px 20px;
    font-family: Arial, sans-serif;
    color: #ffffff;
    text-align: center;
  }

  .lf-stats-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .lf-stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); 
    gap: 40px;
  }

  .lf-stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .lf-stat-number-wrapper {
    display: flex;
    align-items: baseline;
    justify-content: center;
    margin-bottom: 12px;
    color: #5ab15a; 
  }

  .lf-counter-value {
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums; 
  }

  .lf-stat-suffix {
    font-size: 40px;
    font-weight: 900;
    margin-left: 4px;
  }

  .lf-stat-label {
    font-size: 15px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    line-height: 1.5;
  }

  .lf-stat-label strong {
    color: #ffffff; 
    display: block;
    font-size: 17px;
    margin-bottom: 4px;
  }

  @media (max-width: 900px) {
    .lf-stats-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }
    .lf-counter-value { font-size: 48px; }
    .lf-stat-suffix { font-size: 34px; }
  }

  @media (max-width: 600px) {
    .lf-stats-grid {
      grid-template-columns: 1fr;
      gap: 30px;
    }
  }
</style>

<div class="lf-stats-section">
  <div class="lf-stats-container">
    <div class="lf-stats-grid">
      
      <div class="lf-stat-item">
        <div class="lf-stat-number-wrapper">
          
          <span class="lf-counter-value" data-target="20">0</span>
          <span class="lf-stat-suffix">+</span>
        </div>
        <div class="lf-stat-label"><strong>Years</strong> of Management Experience</div>
      </div>

      <div class="lf-stat-item">
        <div class="lf-stat-number-wrapper">
          <span class="lf-counter-value" data-target="50">0</span>
          <span class="lf-stat-suffix">+</span>
        </div>
        <div class="lf-stat-label"><strong>Premium Fabrics</strong> Mastered & Sourced</div>
      </div>

      <div class="lf-stat-item">
        <div class="lf-stat-number-wrapper">
          <span class="lf-counter-value" data-target="900">0</span>
          <span class="lf-stat-suffix">+</span>
        </div>
        <div class="lf-stat-label"><strong>Fill Power</strong> Certified Down Standard</div>
      </div>

      <div class="lf-stat-item">
        <div class="lf-stat-number-wrapper">
          <span class="lf-counter-value" data-target="4">0</span>
          <span class="lf-stat-suffix"></span> 
        </div>
        <div class="lf-stat-label"><strong>Stage</strong> AQL Quality Control System</div>
      </div>

    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const counters = document.querySelectorAll('.lf-counter-value');
    

    const observerOptions = {
      root: null,
      threshold: 0.3
    };

    const counterObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const counter = entry.target;
          const target = +counter.getAttribute('data-target');
          const duration = 2000;
          const increment = target / (duration / 16); 

          let current = 0;
          const updateCounter = () => {
            current += increment;
            if (current < target) {
              counter.innerText = Math.ceil(current);
              requestAnimationFrame(updateCounter); 
            } else {
              counter.innerText = target; 
            }
          };
          
          updateCounter();
          observer.unobserve(counter); 
        }
      });
    }, observerOptions);

    counters.forEach(counter => {
      counterObserver.observe(counter);
    });
  });
</script>
